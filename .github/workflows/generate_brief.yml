name: Generate EDB Macro Brief

# Triggers:
#   1. schedule       — daily autonomous run at 05:00 UTC (≈ 09:00 Gulf time)
#   2. workflow_dispatch — any collaborator clicks "Run workflow" in the Actions UI
#   3. issues (opened/reopened) — collaborator opens an issue titled "Generate Brief"
#      (this is what the GitHub Pages "Generate New Brief" button does).
#
# The brief is produced by the **Claude Agent SDK** runner (run_agent_sdk.py),
# which needs Node.js + the `claude` CLI and routes the model through OpenRouter.

on:
  schedule:
    - cron: '0 5 * * *'          # daily 05:00 UTC

  workflow_dispatch:
    inputs:
      notes:
        description: 'Optional notes (shown in commit message)'
        required: false
        default: ''
      run_eval:
        description: 'Run the AutoRubric evaluation after the brief'
        required: false
        default: 'true'

  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write

jobs:
  generate-brief:
    # For issues: only if title contains "Generate Brief" AND author is a collaborator/owner.
    # For schedule / workflow_dispatch: always run.
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        contains(github.event.issue.title, 'Generate Brief') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association)
      )

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # full history so rebase before push works cleanly

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install the Claude Code CLI (required by the Agent SDK)
        run: npm install -g @anthropic-ai/claude-code --no-audit --no-fund

      - name: Install Python dependencies
        run: pip install -r requirements.txt   # includes claude-agent-sdk

      - name: Run EDB agent (Claude Agent SDK)
        id: run_agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-sonnet-4-6' }}
          AGENT_MAX_BUDGET_USD: ${{ vars.AGENT_MAX_BUDGET_USD || '5' }}
        run: |
          set -o pipefail  # propagate Python exit code through the pipe
          python run_agent_sdk.py 2>&1 | tee agent_output.txt
          SUMMARY=$(grep "^SUMMARY_JSON=" agent_output.txt | tail -1 | sed 's/^SUMMARY_JSON=//')
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "brief_name=$(echo $SUMMARY | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d["brief_name"])')" >> $GITHUB_OUTPUT

      - name: Run AutoRubric evaluation
        # Runs on schedule always; on manual dispatch unless run_eval=false; skipped for the
        # lightweight Pages "Generate" button (issue trigger). Non-fatal — a flaky eval must
        # not lose the brief.
        if: |
          success() && (
            github.event_name == 'schedule' ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.run_eval != 'false')
          )
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AUTORUBRIC_JUDGES: ${{ vars.AUTORUBRIC_JUDGES || 'openrouter/anthropic/claude-haiku-4-5,openrouter/google/gemini-2.5-flash' }}
        # --patch-claude-md closes the self-improvement loop: penalties that fire and
        # dimensions ≤2/5 are appended to CLAUDE.md (idempotent), so the next brief learns.
        run: python -m eval_autorubric.run_eval --patch-claude-md

      - name: Commit outputs to repository
        run: |
          git config user.name  "EDB Macro Agent"
          git config user.email "agent@edb-macro.ai"
          git add outputs/ CLAUDE.md   # CLAUDE.md may gain self-improvement notes from the eval
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            NOTE="${{ github.event.inputs.notes }}"
            MSG="brief: $(date -u +%Y-%m-%d)"
            [ -n "$NOTE" ] && MSG="$MSG — $NOTE"
            git commit -m "$MSG [automated, agent-sdk]"
            git pull --rebase origin main
            git push
          fi

      - name: Comment on issue and close it
        if: github.event_name == 'issues' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const briefName = '${{ steps.run_agent.outputs.brief_name }}';
            const pagesUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
            const repoUrl  = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/outputs/${briefName}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `✅ **Brief generated: \`${briefName}\`**`,
                '',
                `📄 [View on GitHub Pages](${pagesUrl})`,
                `📁 [Raw file in repo](${repoUrl})`,
                '',
                '_This issue was automatically closed by the EDB Macro Agent._'
              ].join('\n')
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment on issue on failure
        if: github.event_name == 'issues' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Brief generation failed.** [View logs](${runUrl})`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
